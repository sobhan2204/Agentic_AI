<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sobhan AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:      #0c0c0e;
    --bg-surface:   #111113;
    --bg-raised:    #18181c;
    --bg-hover:     #1e1e24;
    --border-dim:   rgba(255,255,255,0.07);
    --border-glow:  rgba(180,170,210,0.18);
    --accent:       #8b7fff;
    --accent-dim:   rgba(139,127,255,0.1);
    --text-primary: #d8d6e4;
    --text-muted:   #7a7890;
    --text-faint:   #42404e;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-sans:  'DM Sans', system-ui, sans-serif;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-xl: 24px;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(80,60,140,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 760px;
    padding: 0 20px 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero {
    margin-top: 72px;
    text-align: center;
    padding: 0 0 28px;
    width: 100%;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.6s ease 0.05s forwards;
  }

  .greeting {
    font-family: var(--font-serif);
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 300;
    line-height: 1.2;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }

  .greeting em {
    font-style: italic;
    color: var(--accent);
    opacity: 0.85;
  }

  .subline {
    font-size: 13.5px;
    color: var(--text-muted);
    letter-spacing: 0.01em;
  }

  .input-wrapper {
    width: 100%;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.2s forwards;
  }

  .input-box {
    width: 100%;
    background: var(--bg-surface);
    border: 0.5px solid var(--border-dim);
    border-radius: var(--radius-xl);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-box:focus-within {
    border-color: var(--border-glow);
    box-shadow: 0 0 0 3px rgba(139,127,255,0.05);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14.5px;
    line-height: 1.6;
    resize: none;
    padding: 18px 22px 8px;
    min-height: 52px;
    max-height: 200px;
    overflow-y: auto;
  }

  textarea::placeholder { color: var(--text-faint); }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px 12px;
  }

  .input-hint {
    font-size: 11.5px;
    color: var(--text-faint);
  }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .clear-btn {
    background: transparent;
    color: var(--text-muted);
    border: 0.5px solid var(--border-dim);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 11.5px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .clear-btn:hover {
    color: var(--text-primary);
    border-color: var(--border-glow);
    background: var(--bg-raised);
  }

  .send-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(139,127,255,0.75);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: rgba(139,127,255,0.95); transform: scale(1.04); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 14px; height: 14px; fill: #0c0c0e; }

  /* Tools row */
  .tools-section {
    width: 100%;
    margin-top: 10px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.32s forwards;
  }

  .tools-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tool-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-surface);
    border: 0.5px solid var(--border-dim);
    border-radius: 40px;
    padding: 5px 11px 5px 7px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s;
    user-select: none;
    white-space: nowrap;
  }

  .tool-chip:hover {
    background: var(--bg-raised);
    border-color: var(--border-glow);
  }

  .tool-chip.active {
    background: var(--bg-raised);
    border-color: var(--border-glow);
  }

  .chip-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }

  .chip-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.01em;
  }

  .tool-chip:hover .chip-name,
  .tool-chip.active .chip-name {
    color: var(--text-primary);
  }

  /* Tool detail panel */
  .tool-detail {
    display: none;
    background: var(--bg-raised);
    border: 0.5px solid var(--border-glow);
    border-radius: var(--radius-md);
    padding: 20px;
    margin-top: 8px;
    animation: expandIn 0.22s ease;
    width: 100%;
  }

  .tool-detail.visible { display: block; }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .detail-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .detail-title {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 400;
    color: var(--text-primary);
  }

  .detail-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .capabilities-label, .examples-label {
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .capabilities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 6px;
    margin-bottom: 16px;
  }

  .cap-item {
    background: var(--bg-surface);
    border: 0.5px solid var(--border-dim);
    border-radius: var(--radius-sm);
    padding: 10px 11px;
    font-size: 12px;
    color: var(--text-primary);
    display: flex;
    align-items: flex-start;
    gap: 7px;
  }

  .cap-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }

  .cap-content { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

  .cap-signature {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 12px;
    color: var(--text-primary);
    word-break: break-word;
    line-height: 1.35;
  }

  .cap-desc {
    font-size: 11.5px;
    color: var(--text-muted);
    line-height: 1.45;
    word-break: break-word;
  }

  .examples-list { display: flex; flex-wrap: wrap; gap: 6px; }

  .example-pill {
    background: var(--accent-dim);
    border: 0.5px solid rgba(139,127,255,0.15);
    border-radius: 40px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s;
    opacity: 0.85;
  }

  .example-pill:hover { background: rgba(139,127,255,0.17); opacity: 1; }

  /* Chat area */
  .chat-area {
    width: 100%;
    margin-top: 10px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .msg { display: flex; gap: 10px; opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; }
  .msg.shown { opacity: 1; transform: none; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; margin-top: 2px;
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble { max-width: 74%; padding: 11px 15px; border-radius: var(--radius-md); font-size: 13.5px; line-height: 1.65; }
  .msg.user .msg-bubble { background: rgba(139,127,255,0.1); border: 0.5px solid rgba(139,127,255,0.15); border-radius: var(--radius-md) 3px var(--radius-md) var(--radius-md); }
  .msg.ai  .msg-bubble { background: var(--bg-surface); border: 0.5px solid var(--border-dim); border-radius: 3px var(--radius-md) var(--radius-md) var(--radius-md); }
  .msg.user .msg-avatar { background: rgba(139,127,255,0.1); color: var(--accent); border: 0.5px solid rgba(139,127,255,0.15); }
  .msg.ai  .msg-avatar { background: var(--bg-raised); border: 0.5px solid var(--border-dim); }

  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span { width: 4px; height: 4px; background: var(--text-faint); border-radius: 50%; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes fadeUp { to { opacity: 1; transform: none; } }
  @keyframes expandIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  @keyframes blink { 0%,80%,100% { opacity:0.2; transform:scale(0.85); } 40% { opacity:1; transform:scale(1.1); } }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 3px; }

  @media (max-width: 480px) {
    .tools-row { gap: 5px; }
    .capabilities-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<main class="page">

  <section class="hero">
    <h1 class="greeting" id="greeting">Good evening</h1>
    <p class="subline">Your intelligent assistant — powered by advanced reasoning &amp; tools.</p>
  </section>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-wrapper">
    <div class="input-box">
      <textarea id="query" rows="1" placeholder="Ask me anything…" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <div class="input-footer">
        <span class="input-hint">Enter to send · Shift+Enter for new line</span>
        <div class="input-actions">
          <button class="clear-btn" onclick="clearChat()" title="Clear conversation">Clear</button>
          <button class="send-btn" onclick="sendMessage()" title="Send">
            <svg viewBox="0 0 20 20"><path d="M2 10.5L18 3l-7 15-2.5-5.5L2 10.5z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <section class="tools-section">
      <div class="tools-row" id="toolsRow">

        <div class="tool-chip" onclick="toggleTool('math')" data-tool="math">
          <div class="chip-icon" style="background:rgba(139,127,255,0.1);color:#8b7fff;">∑</div>
          <span class="chip-name">Math</span>
        </div>

        <div class="tool-chip" onclick="toggleTool('weather')" data-tool="weather">
          <div class="chip-icon" style="background:rgba(70,160,200,0.1);">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(70,160,200,0.85)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
          </div>
          <span class="chip-name">Weather</span>
        </div>

        <div class="tool-chip" onclick="toggleTool('translate')" data-tool="translate">
          <div class="chip-icon" style="background:rgba(180,150,90,0.1);">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(180,150,90,0.85)" stroke-width="2" stroke-linecap="round"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
          </div>
          <span class="chip-name">Translate</span>
        </div>

        <div class="tool-chip" onclick="toggleTool('websearch')" data-tool="websearch">
          <div class="chip-icon" style="background:rgba(70,170,120,0.1);">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(70,170,120,0.85)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <span class="chip-name">Web Search</span>
        </div>

        <div class="tool-chip" onclick="toggleTool('gmail')" data-tool="gmail">
          <div class="chip-icon" style="background:rgba(200,80,80,0.1);">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(200,80,80,0.8)" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <span class="chip-name">Gmail</span>
        </div>

      </div>
      <div id="toolDetail" class="tool-detail"></div>
    </section>
  </div>

</main>

<script>
const TOOLS = {
  math: {
    iconText: '∑', iconBg: 'rgba(139,127,255,0.12)', iconColor: '#8b7fff',
    accent: '#8b7fff', accentDim: 'rgba(139,127,255,0.1)', accentBorder: 'rgba(139,127,255,0.18)',
    name: 'Math Engine',
    desc: 'Actual function exposed by Math tool server.',
    functions: ['solve_math(query): Solve math expressions, equations, and symbolic operations'],
    examples: ['What is 2^32?','Solve x² - 5x + 6 = 0','Convert 100 miles to km','sin(π/4) + cos(π/3)'],
  },
  weather: {
    iconSvg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(70,160,200,0.9)" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>`,
    iconBg: 'rgba(70,160,200,0.12)', accent: '#46a0c8', accentDim: 'rgba(70,160,200,0.1)', accentBorder: 'rgba(70,160,200,0.2)',
    name: 'Weather',
    desc: 'Actual functions exposed by Weather tool server.',
    functions: ['get_weather(city): Return current weather details for a city','get_air_quality(city): Return AQI and pollutant information for a city'],
    examples: ['Weather in Tokyo today','Is it raining in Mumbai?','Temperature in New York','Wind speed in Dubai'],
  },
  translate: {
    iconSvg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(180,150,90,0.9)" stroke-width="1.8" stroke-linecap="round"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>`,
    iconBg: 'rgba(180,150,90,0.12)', accent: '#b4965a', accentDim: 'rgba(180,150,90,0.1)', accentBorder: 'rgba(180,150,90,0.2)',
    name: 'Translate',
    desc: 'Actual function exposed by Translate tool server.',
    functions: ['translate(sentence, target_language): Translate input sentence to target language'],
    examples: ['Translate "Hello" to French','"Good morning" in Japanese','Translate this to Spanish…','Say "I love you" in Arabic'],
  },
  websearch: {
    iconSvg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(70,170,120,0.9)" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
    iconBg: 'rgba(70,170,120,0.12)', accent: '#46aa78', accentDim: 'rgba(70,170,120,0.1)', accentBorder: 'rgba(70,170,120,0.2)',
    name: 'Web Search',
    desc: 'Actual function exposed by Web Search tool server.',
    functions: ['search_web(query): Search the web and return summarized findings'],
    examples: ['Latest news on AI today','Who won IPL 2024?','Current Bitcoin price','Best Python libraries 2025'],
  },
  gmail: {
    iconSvg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(200,80,80,0.9)" stroke-width="1.8" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
    iconBg: 'rgba(200,80,80,0.12)', accent: '#c85050', accentDim: 'rgba(200,80,80,0.1)', accentBorder: 'rgba(200,80,80,0.2)',
    name: 'Gmail',
    desc: 'Actual functions exposed by Gmail tool server.',
    functions: ['read_emails(query, max_results=5): Read matching Gmail messages','send_email(recipient, subject, body): Send an email via Gmail API'],
    examples: ['Email bob@test.com about meeting','Send translation result to Alice','Draft a follow-up email','Email weather report to team'],
  },
};

function setGreeting() {
  const h = new Date().getHours();
  let g = h < 5 ? 'Good night' : h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : h < 21 ? 'Good evening' : 'Good night';
  document.getElementById('greeting').innerHTML = `${g}, <em>how can I help?</em>`;
}
setGreeting();

let activeTool = null;

function toggleTool(id) {
  const detail = document.getElementById('toolDetail');
  const chips = document.querySelectorAll('.tool-chip');

  if (activeTool === id) {
    activeTool = null;
    detail.classList.remove('visible');
    chips.forEach(c => c.classList.remove('active'));
    return;
  }

  activeTool = id;
  chips.forEach(c => c.classList.toggle('active', c.dataset.tool === id));

  const t = TOOLS[id];
  const iconHtml = t.iconSvg ? t.iconSvg : `<span style="font-size:18px;color:${t.iconColor}">${t.iconText}</span>`;

  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-icon" style="background:${t.iconBg}">${iconHtml}</div>
      <h2 class="detail-title">${t.name}</h2>
    </div>
    <p class="detail-desc">${t.desc}</p>
    <p class="capabilities-label">Capabilities</p>
    <div class="capabilities-grid">
      ${t.functions.map(fn=>{
        const parts = fn.split(':');
        const signature = parts[0].trim();
        const detail = parts.length > 1 ? parts.slice(1).join(':').trim() : '';
        return `<div class="cap-item"><span class="cap-dot" style="background:${t.accent}"></span><div class="cap-content"><div class="cap-signature">${signature}</div>${detail ? `<div class="cap-desc">${detail}</div>` : ''}</div></div>`;
      }).join('')}
    </div>
    <p class="examples-label">Try asking</p>
    <div class="examples-list">
      ${t.examples.map(e=>`<span class="example-pill" onclick="prefillQuery('${e.replace(/'/g,"\\'")}')"> ${e}</span>`).join('')}
    </div>
  `;

  detail.classList.add('visible');
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function prefillQuery(text) {
  const ta = document.getElementById('query');
  ta.value = text;
  autoResize(ta);
  ta.focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

let msgId = 0;

async function clearChat() {
  const chat = document.getElementById('chatArea');

  try {
    const res = await fetch('/clear', { method: 'POST' });
    const data = await res.json();

    if (!res.ok || !data || data.status !== 'success') {
      throw new Error('clear failed');
    }

    chat.innerHTML = '';

    const aiDiv = document.createElement('div');
    aiDiv.className = 'msg ai';
    aiDiv.innerHTML = `<div class="msg-avatar"><svg width="14" height="14" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="13" stroke="rgba(139,127,255,0.35)" stroke-width="0.8"/><circle cx="18" cy="18" r="4" fill="#8b7fff" opacity="0.8"/></svg></div><div class="msg-bubble">Conversation cleared.</div>`;
    chat.appendChild(aiDiv);
    setTimeout(() => aiDiv.classList.add('shown'), 20);
  } catch (err) {
    const aiDiv = document.createElement('div');
    aiDiv.className = 'msg ai';
    aiDiv.innerHTML = `<div class="msg-avatar"><svg width="14" height="14" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="13" stroke="rgba(139,127,255,0.35)" stroke-width="0.8"/><circle cx="18" cy="18" r="4" fill="#8b7fff" opacity="0.8"/></svg></div><div class="msg-bubble">Unable to clear conversation. Please check backend status.</div>`;
    chat.appendChild(aiDiv);
    setTimeout(() => aiDiv.classList.add('shown'), 20);
    aiDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

async function sendMessage() {
  const ta = document.getElementById('query');
  const txt = ta.value.trim();
  if (!txt) return;

  const chat = document.getElementById('chatArea');

  const uid = 'msg-' + (++msgId);
  const userDiv = document.createElement('div');
  userDiv.className = 'msg user'; userDiv.id = uid;
  userDiv.innerHTML = `<div class="msg-avatar">U</div><div class="msg-bubble">${escHtml(txt)}</div>`;
  chat.appendChild(userDiv);
  setTimeout(() => userDiv.classList.add('shown'), 20);

  ta.value = ''; autoResize(ta); ta.focus();

  const tid = 'typing-' + (++msgId);
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg ai'; typingDiv.id = tid;
  typingDiv.innerHTML = `<div class="msg-avatar"><svg width="14" height="14" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="13" stroke="rgba(139,127,255,0.35)" stroke-width="0.8"/><circle cx="18" cy="18" r="4" fill="#8b7fff" opacity="0.8"/></svg></div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(typingDiv);
  setTimeout(() => typingDiv.classList.add('shown'), 80);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: txt }),
    });

    const data = await res.json();
    const reply = (data && typeof data.response === 'string' && data.response.trim())
      ? data.response
      : 'I could not generate a response.';

    typingDiv.remove();
    const aiDiv = document.createElement('div');
    aiDiv.className = 'msg ai';
    aiDiv.innerHTML = `<div class="msg-avatar"><svg width="14" height="14" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="13" stroke="rgba(139,127,255,0.35)" stroke-width="0.8"/><circle cx="18" cy="18" r="4" fill="#8b7fff" opacity="0.8"/></svg></div><div class="msg-bubble">${escHtml(reply)}</div>`;
    chat.appendChild(aiDiv);
    setTimeout(() => aiDiv.classList.add('shown'), 20);
    aiDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch (err) {
    typingDiv.remove();
    const aiDiv = document.createElement('div');
    aiDiv.className = 'msg ai';
    aiDiv.innerHTML = `<div class="msg-avatar"><svg width="14" height="14" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="13" stroke="rgba(139,127,255,0.35)" stroke-width="0.8"/><circle cx="18" cy="18" r="4" fill="#8b7fff" opacity="0.8"/></svg></div><div class="msg-bubble">Unable to reach backend. Please check that the server is running on port 8080.</div>`;
    chat.appendChild(aiDiv);
    setTimeout(() => aiDiv.classList.add('shown'), 20);
    aiDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
